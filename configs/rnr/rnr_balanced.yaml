{
  "method": "rnr_tome",
  "model": "cogvideox-2b",
  "encoder_first": true,
  "similarity_type": "euclidean",
  "reduce_mode": "replace",
  "dst_stride": [2, 2, 2],
  "matching_cache_steps": 3,
  "q_reduce_ratio": 0.30,
  "kv_reduce_ratio": 0.15,
  "layers": "middle_wide",
  "protect_first_frame": true,
  "protect_topk_ratio": 0.15,
  "cfg_consistent": true,
  "prop_attn": true,
  "block_skip": {
    "first_n": 1,
    "last_n": 1
  },
  "step_skip": {
    "first_frac": 0.05,
    "last_frac": 0.05
  }
}
