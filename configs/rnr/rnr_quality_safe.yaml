{
  "method": "rnr_tome",
  "model": "cogvideox-2b",
  "encoder_first": true,
  "similarity_type": "euclidean",
  "reduce_mode": "replace",
  "dst_stride": [1, 2, 2],
  "matching_cache_steps": 1,
  "q_reduce_ratio": 0.10,
  "kv_reduce_ratio": 0.05,
  "layers": "middle",
  "protect_first_frame": true,
  "protect_topk_ratio": 0.25,
  "cfg_consistent": true,
  "prop_attn": true,
  "block_skip": {
    "first_n": 2,
    "last_n": 2
  },
  "step_skip": {
    "first_frac": 0.15,
    "last_frac": 0.15
  }
}
